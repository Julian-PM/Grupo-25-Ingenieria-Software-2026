<!DOCTYPE html>
<html lang="en">
<head>
  <title>Cliente</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container-fluid">
  <h1>My First Bootstrap Page</h1>
  <p>This part is inside a .container-fluid class.</p>
  <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#crearModal"">Crear</button>
  <button type="button" class="btn btn-success">Actualizar</button>
  <button type="button" class="btn btn-success">Borrar</button>
  <button type="button" class="btn btn-success">Ver</button>
  <p>The .container-fluid class provides a full width container, spanning the entire width of the viewport.</p>
</div>


<div class="modal" id="crearModal">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">

      <!-- Modal Header -->
      <div class="modal-header">
        <h4 class="modal-title">Crear Cliente</h4>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <!-- Modal body -->
      <div class="modal-body">
        <form method="POST" role="form" action="#">
            <div class="mb-3 mt-3">
                <label for="idClienteForm" class="form-label">id del Cliente:</label>
                <input type="text" class="form-control" id="idClienteForm" placeholder="Inserte id del cliente" name="idCliente">
            </div>
            <div class="mb-3 mt-3">
                <label for="rutForm" class="form-label">Rut:</label>
                <input type="text" class="form-control" id="rutForm" placeholder="Inserte Rut sin dígito verificador" name="rut">
            </div>
            <div class="mb-3 mt-3">
                <label for="nombreForm" class="form-label">Nombre:</label>
                <input type="text" class="form-control" id="nombreForm" placeholder="Inserte nombre" name="nombre">
            </div>
            <div class="mb-3">
                <label for="correoForm" class="form-label">Correo:</label>
                <input type="email" class="form-control" id="correoForm" placeholder="Inserte correo" name="correo">
            </div>
            <div class="mb-3 mt-3">
                <label for="telefonoForm" class="form-label">Teléfono:</label>
                <input type="text" class="form-control" id="telefonoForm" placeholder="Inserte teléfono" name="telefono">
            </div>
            <div class="mb-3 mt-3">
                <label for="direccionForm" class="form-label">Dirección:</label>
                <input type="text" class="form-control" id="direccionForm" placeholder="Inserte dirección" name="direccion">
            </div>
            <div class="form-check mb-3">
                <label class="form-check-label">
                <input class="form-check-input" id="activoForm" type="checkbox" name="activo" value= true> Activo
                </label>
            </div>
            <div class="mb-3 mt-3">
                <label for="digVerForm" class="form-label">Dígito verificador:</label>
                <input type="text" class="form-control" id="digVerForm" placeholder="Inserte dígito verificador" name="digVer">
            </div>
            <div class="mb-3 mt-3">
                <label for="abreviacionForm" class="form-label">Abreviación:</label>
                <input type="text" class="form-control" id="abreviacionForm" placeholder="Inserte abreviación" name="abreviacion">
            </div>
            <div class="mb-3 mt-3">
                <label for="ciudadForm" class="form-label">Ciudad:</label>
                <input type="text" class="form-control" id="ciudadForm" placeholder="Inserte ciudad" name="ciudad">
            </div>
            <div class="mb-3 mt-3">
                <label for="comunaForm" class="form-label">Comuna:</label>
                <input type="" class="form-control" id="comunaForm" placeholder="Inserte comuna" name="comuna">
            </div>
            <div class="mb-3 mt-3">
                <label for="condicionesVentaForm" class="form-label">Condiciones de venta:</label>
                <input type="text" class="form-control" id="condicionesVentaForm" placeholder="Inserte condiciones de venta" name="condicionesVenta">
            </div>
            <div class="mb-3 mt-3">
                <label for="viaDespachoForm" class="form-label">Vía de despacho:</label>
                <input type="text" class="form-control" id="viaDespachoForm" placeholder="Inserte vía de despacho" name="viaDespacho">
            </div>
            <div class="mb-3 mt-3">
                <label for="porComisionForm" class="form-label">Porcentaje de comisión:</label>
                <input type="number" class="form-control" id="porComisionForm" placeholder="Inserte porcentaje de comisión" name="porComision">
            </div>
            <div class="mb-3 mt-3">
                <label for="porCobranzaForm" class="form-label">Porcentaje de cobranza:</label>
                <input type="number" class="form-control" id="porCobranzaForm" placeholder="Inserte porcentaje de cobranza" name="porCobranza">
            </div>
            <div class="mb-3 mt-3">
                <label for="observacionesForm" class="form-label">Observaciones:</label>
                <input type="text" class="form-control" id="observacionesForm" placeholder="Inserte observaciones" name="observaciones">
            </div>
            <div class="mb-3 mt-3">
                <label for="idZonaVentaForm" class="form-label">id Zona de venta:</label>
                <input type="number" class="form-control" id="idZonaVentaForm" placeholder="Inserte id de la zona de venta" name="idZonaVenta">
            </div>
            <button type="submit" class="btn btn-primary">Crear</button>
        </form>
      </div>

      <!-- Modal footer -->
      <div class="modal-footer">
        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cancelar</button>
      </div>

    </div>
  </div>
</div>


</body>
</html>
