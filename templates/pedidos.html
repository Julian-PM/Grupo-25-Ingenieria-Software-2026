<!DOCTYPE html>
<html lang="en">
<head>
  <title>Pedidos - Comercial D Nix</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta id="foo" data-name="{{datos.data}}">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<script>


    function createTableFromJSON() {
        var test = document.querySelector('#my_variable').value 
        const data = JSON.parse(test)
        if (!data || !data.length) return;

        const table = document.createElement('table');
        table.className = "table table-striped";
        const thead = document.createElement('thead');
        const tbody = document.createElement('tbody');
        const headerRow = document.createElement('tr');

        // Extract headers from the first object's keys
        const headers = Object.keys(data[0]);
        console.log(headers)
        headers.forEach(key => {
            const th = document.createElement('th');
            th.textContent = key;
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);

        // Create rows for each data object
        data.forEach((rowData) => {
            const tr = document.createElement('tr');
            headers.forEach(key => {
            const td = document.createElement('td');
            // Handle null/undefined or nested objects
            const value = rowData[key];
            td.textContent = (typeof value === 'object') ? JSON.stringify(value) : value;
            tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });

        table.appendChild(thead);
        table.appendChild(tbody);
        document.getElementById('tablaPedidos').appendChild(table);
        } 
</script>

<body>
<input type="hidden"  id="my_variable" value='{{ datos | tojson }}'>


<div class="container-fluid" >
  
  <h1>Pedidos</h1>
  <p>Elija una opción.</p>
  <!--Cada botón abrirá un modal-->
  <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#crearModal">Crear</button>
  <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#actualizarModal">Actualizar</button>
  <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#borrarModal">Borrar</button>
  <button type="button" class="btn btn-success" onclick="createTableFromJSON()">Ver</button>
  <div class="container-fluid" id="tablaPedidos" onload="createTableFromJSON()"></div>
  
</div>

<div class="modal" id="crearModal">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">

      <!-- Modal Header -->
      <div class="modal-header">
        <h4 class="modal-title">Crear Pedido</h4>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <!-- Modal body -->
      <div class="modal-body">

        <form method="POST" role="form" action="#">
            <input type="hidden" name="_method" value="post" />
            <!--Desde aquí se ponen los datos. Hay que cambiar estos por los de cada entidad.-->
            <div class="mb-3">
                <label for="IDClienteForm" class="form-label">ID del cliente asociado:</label>
                <input type="text" class="form-control" id="IDClienteForm" placeholder="Inserte id del cliente asociado" name="IDClienteCrear">
            </div>
            <div class="mb-3">
                <label for="fechaPedidoForm" class="form-label">Fecha del pedido:</label>
                <input type="date" class="form-control" id="fechaPedidoForm" placeholder="Inserte fecha de realización del pedido" name="fechaPedidoCrear">
            </div>
            <div class="mb-3">
                <label for="fechaLimiteForm" class="form-label">Fecha límite de entrega del pedido:</label>
                <input type="date" class="form-control" id="fechaLimiteForm" placeholder="Inserte fecha límite de entrega del pedido" name="fechaLimiteCrear">
            </div>
            <div class="mb-3">
                <label for="VendedorForm" class="form-label">ID del vendedor asociado:</label>
                <input type="text" class="form-control" id="VendedorForm" placeholder="Inserte el id del vendedor asociado" name="IDVendedorCrear">
            </div>
            <button type="submit" class="btn btn-primary">Crear</button>
        </form>
      </div>

      <!-- Modal footer -->
      <div class="modal-footer">
        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cancelar</button>
      </div>

    </div>
  </div>
</div>

<div class="modal" id="actualizarModal">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">

      <!-- Modal Header -->
      <div class="modal-header">
        <h4 class="modal-title">Actualizar Pedido</h4>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <!-- Modal body -->
      <div class="modal-body">
        <form method="POST" role="form" action="#">
            <input type="hidden" name="_method" value="put" />
            <!--Desde aquí se ponen los datos. Hay que cambiar estos por los de cada entidad.-->
            <div class="mb-3 mt-3">
                <label for="IDidPedidoActualizar" class="form-label">Id del pedido a actualizar:</label>
                <input type="text" class="form-control" id="IDidPedidoActualizar" placeholder="Inserte id de la talla" name="IdPedidoActualizar">
            </div>
            <div class="mb-3">
                <label for="IDClienteForm" class="form-label">ID del cliente asociado:</label>
                <input type="text" class="form-control" id="IDClienteForm" placeholder="Inserte id del cliente asociado" name="IDClienteActualizar">
            </div>
            <div class="mb-3">
                <label for="fechaPedidoForm" class="form-label">Fecha del pedido:</label>
                <input type="date" class="form-control" id="fechaPedidoForm" placeholder="Inserte fecha de realización del pedido" name="fechaPedidoActualizar">
            </div>
            <div class="mb-3">
                <label for="fechaLimiteForm" class="form-label">Fecha límite de entrega del pedido:</label>
                <input type="date" class="form-control" id="fechaLimiteForm" placeholder="Inserte fecha límite de entrega del pedido" name="fechaLimiteActualizar">
            </div>
            <div class="mb-3">
                <label for="VendedorForm" class="form-label">ID del vendedor asociado:</label>
                <input type="text" class="form-control" id="VendedorForm" placeholder="Inserte el id del vendedor asociado" name="IDVendedorActualizar">
            </div>
            <button type="submit" class="btn btn-primary">Actualizar</button>
        </form>
      </div>

      <!-- Modal footer -->
      <div class="modal-footer">
        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cancelar</button>
      </div>

    </div>
  </div>
</div>

<div class="modal" id="borrarModal">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">

      <!-- Modal Header -->
      <div class="modal-header">
        <h4 class="modal-title">Borrar Pedido</h4>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <!-- Modal body -->
      <div class="modal-body">
        <form method="POST" role="form" action="#">
            <input type="hidden" name="_method" value="delete" />
            <!--Desde aquí se ponen los datos. Hay que cambiar estos por los de cada entidad.-->
            <div class="mb-3 mt-3">
                <label for="idPedidoFormBorrar" class="form-label">Id del pedido:</label>
                <input type="text" class="form-control" id="idPedidoFormBorrar" placeholder="Inserte id del pedido" name="idPedidoBorrar">
            </div>
            <button type="submit" class="btn btn-primary">Borrar</button>
        </form>
      </div>

      <!-- Modal footer -->
      <div class="modal-footer">
        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cancelar</button>
      </div>

    </div>
  </div>
</div>

</body>

</html>
