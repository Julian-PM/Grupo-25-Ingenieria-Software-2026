    function createTableFromJSON() {
        var test = document.querySelector('#my_variable').value 
        const data = JSON.parse(test)
        if (!data || !data.length) return;

        const table = document.createElement('table');
        const thead = document.createElement('thead');
        const tbody = document.createElement('tbody');
        const headerRow = document.createElement('tr');

        // Extract headers from the first object's keys
        const headers = Object.keys(data[0]);
        console.log(headers)
        headers.forEach(key => {
            const th = document.createElement('th');
            th.textContent = key;
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);

        // Create rows for each data object
        data.forEach((rowData) => {
            const tr = document.createElement('tr');
            headers.forEach(key => {
            const td = document.createElement('td');
            // Handle null/undefined or nested objects
            const value = rowData[key];
            td.textContent = (typeof value === 'object') ? JSON.stringify(value) : value;
            tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });

        table.appendChild(thead);
        table.appendChild(tbody);
        document.getElementById('tablaClientes').appendChild(table);
        } 
</script>
