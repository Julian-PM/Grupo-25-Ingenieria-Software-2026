<!DOCTYPE html>
<html lang="en">
<head>
  <title>Cortes - Comercial D Nix</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta id="foo" data-name="{{datos.data}}">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<script>


    function createTableFromJSON() {
        var test = document.querySelector('#my_variable').value 
        const data = JSON.parse(test)
        if (!data || !data.length) return;

        const table = document.createElement('table');
        table.className = "table table-striped";
        const thead = document.createElement('thead');
        const tbody = document.createElement('tbody');
        const headerRow = document.createElement('tr');

        // Extract headers from the first object's keys
        const headers = Object.keys(data[0]);
        console.log(headers)
        headers.forEach(key => {
            const th = document.createElement('th');
            th.textContent = key;
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);

        // Create rows for each data object
        data.forEach((rowData) => {
            const tr = document.createElement('tr');
            headers.forEach(key => {
            const td = document.createElement('td');
            // Handle null/undefined or nested objects
            const value = rowData[key];
            td.textContent = (typeof value === 'object') ? JSON.stringify(value) : value;
            tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });

        table.appendChild(thead);
        table.appendChild(tbody);
        document.getElementById('tablaCortes').appendChild(table);
        } 
</script>

<body>
<input type="hidden"  id="my_variable" value='{{ datos | tojson }}'>


<div class="container-fluid" >
  
  <h1>Cortes</h1>
  <p>Elija una opción.</p>
  <!--Cada botón abrirá un modal-->
  <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#crearModal">Crear</button>
  <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#actualizarModal">Actualizar</button>
  <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#borrarModal">Borrar</button>
  <button type="button" class="btn btn-success" onclick="createTableFromJSON()">Ver</button>
  <div class="container-fluid" id="tablaCortes" onload="createTableFromJSON()"></div>
  
</div>

<div class="modal" id="crearModal">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">

      <!-- Modal Header -->
      <div class="modal-header">
        <h4 class="modal-title">Crear Cortes</h4>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <!-- Modal body -->
      <div class="modal-body">
        <!-- form tiene que tener method POST y role form para que los datos se envíen.-->
         <!-- Action es a dónde los manda, y # los manda a la misma página-->
        <form method="POST" role="form" action="#">
            <input type="hidden" name="_method" value="post" />
            <!--Desde aquí se ponen los datos. Hay que cambiar estos por los de cada entidad.-->
            <div class="mb-3 mt-3">
                <label for="fechaCorteForm" class="form-label">Fecha corte:</label>
                <input type="date" class="form-control" id="fechaCorteForm" placeholder="Inserte fecha del corte" name="fechaCorteCrear">
            </div>
            <div class="mb-3 mt-3">
                <label for="cortadorForm" class="form-label">Cortador:</label>
                <input type="text" class="form-control" id="cortadorForm" placeholder="Inserte cortador" name="cortadorCrear">
            </div>
            <div class="mb-3 mt-3">
                <label for="cantidadForm" class="form-label">Cantidad:</label>
                <input type="number" class="form-control" id="cantidadForm" placeholder="Inserte cantidad" name="cantidadCrear">
            </div>
            <div class="mb-3 mt-3">
                <label for="observacionesForm" class="form-label">Observaciones:</label>
                <input type="text" class="form-control" id="observacionesForm" placeholder="Inserte observaciones" name="observacionesCrear">
            </div>
            <div class="mb-3 mt-3">
                <label for="materialForm" class="form-label">Material usado:</label>
                <input type="text" class="form-control" id="materialForm" placeholder="Inserte material a usar" name="materialCrear">
            </div>
            <div class="mb-3 mt-3">
                <label for="idProductoForm" class="form-label">Id producto asociado:</label>
                <input type="text" class="form-control" id="idProductoForm" placeholder="Inserte id del producto" name="IdProductoCrear">
            </div>
            <button type="submit" class="btn btn-primary">Crear</button>
        </form>
      </div>

      <!-- Modal footer -->
      <div class="modal-footer">
        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cancelar</button>
      </div>

    </div>
  </div>
</div>

            </div>
            <div class="mb-3 mt-3">

            <div class="mb-3 mt-3">

</div>

<div class="modal" id="borrarModal">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">

      <!-- Modal Header -->

      <!-- Modal body -->

</div>

</body>
